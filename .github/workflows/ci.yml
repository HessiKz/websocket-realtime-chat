name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GitHub Pages serves the static site directly from the `main` branch root,
# so this workflow only validates the assets. No separate publish step needed.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate site assets
        run: |
          test -f index.html && test -f manifest.js && test -f app.js && test -f engine.js && test -f designs.js
          node -e "global.window={};require('./manifest.js');console.log('manifest ok:',window.MANIFEST.projects.length,'projects')"
      - name: Build check (no-op for static site)
        run: echo "Static site is served from main branch root by GitHub Pages."
